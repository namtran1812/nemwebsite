<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nam Tran's personal website is currently being rebuilt." />
  <meta name="theme-color" content="#f4f1ea" />
  <title>Nam Tran — Coming Soon</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f4f1ea;
      --foreground: #181817;
      --muted: #74716a;
      --line: rgba(24, 24, 23, 0.16);
      --accent: #ff5c35;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 92, 53, 0.11), transparent 28rem),
        var(--background);
      color: var(--foreground);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.12'/%3E%3C/svg%3E");
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(1.25rem, 3vw, 2.5rem);
    }

    header, footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 700;
    }

    .dot {
      width: 0.68rem;
      height: 0.68rem;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(255, 92, 53, 0.45);
      animation: pulse 2.3s ease-out infinite;
    }

    .status, footer { color: var(--muted); }

    .hero {
      align-self: center;
      max-width: 980px;
      padding: 8vh 0;
    }

    .eyebrow {
      margin: 0 0 1.2rem;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 650;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 11ch;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(4rem, 12vw, 10.5rem);
      font-weight: 400;
      line-height: 0.82;
      letter-spacing: -0.075em;
    }

    h1 span {
      display: block;
      margin-left: clamp(1rem, 8vw, 7rem);
      color: var(--accent);
      font-style: italic;
    }

    .subcopy {
      max-width: 38rem;
      margin: clamp(2rem, 5vw, 3.75rem) 0 0 auto;
      font-size: clamp(1rem, 2vw, 1.35rem);
      line-height: 1.55;
      color: var(--muted);
    }

    footer {
      border-top: 1px solid var(--line);
      padding-top: 1rem;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      transition: color 180ms ease;
    }

    a:hover, a:focus-visible { color: var(--accent); }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 92, 53, 0.35); }
      70%, 100% { box-shadow: 0 0 0 0.75rem rgba(255, 92, 53, 0); }
    }

    @media (max-width: 640px) {
      .status { display: none; }
      h1 { font-size: clamp(4.3rem, 22vw, 7rem); }
      h1 span { margin-left: 0.5rem; }
      .subcopy { margin-left: 0; }
      footer { align-items: flex-end; }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand"><span class="dot" aria-hidden="true"></span> Nam Tran</div>
      <div class="status">Portfolio refresh · 2026</div>
    </header>

    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">Something new is taking shape</p>
      <h1 id="page-title">Currently <span>building.</span></h1>
      <p class="subcopy">Coming soon.</p>
    </section>

    <footer>
      <span>Software engineer &amp; builder</span>
      <a href="mailto:hoangnamtran18122005@gmail.com">Get in touch</a>
    </footer>
  </main>
</body>
</html>
